apiVersion: v1
kind: Service
metadata:
  name: mongo-headless-service
  labels:
    app: mongo
spec:
  clusterIP: None # определяет Headless
  selector:
    app: mongo
  ports:
  - port: 27017
    targetPort: 27017

---
apiVersion: v1
kind: Service
metadata:
  name: mongo-primary
spec:
  type: NodePort
  ports:
  - port: 27017
    targetPort: 27017
    nodePort: 32017
  selector:
    app: mongo