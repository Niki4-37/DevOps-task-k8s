apiVersion: v1
kind: Service
metadata:
  name: mongo-headless-service
  namespace: databases
  labels:
    app: mongo
spec:
  clusterIP: None # определяет Headless
  selector:
    app: mongo
  ports:
  - port: 27017
    targetPort: 27017

apiVersion: v1
kind: Service
metadata:
  name: mongodb-stats-service
  namespace: databases
  labels:
    app: mongo
spec:
  selector:
    app: mongo
  ports:
    - name: metrics
      port: 9216
      targetPort: metrics 